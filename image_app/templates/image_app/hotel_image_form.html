{% extends 'user/base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}
 Image Upload
{% endblock %}

{% block content %}
   <div class="container">
      <div class="jumbotron">
         <form method="POST" enctype='multipart/form-data'>
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit">Upload</button>

         </form>
      </div>
   </div>

{% endblock %}
